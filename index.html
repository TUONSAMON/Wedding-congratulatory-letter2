<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>✨ Wedding wishes · with song & image ✨</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Roboto,'Helvetica Neue',system-ui,sans-serif;}
    body{
      min-height:100vh;
      background:linear-gradient(145deg,#fce4ec 0%,#ffe0f0 40%,#fff3e6 100%);
      display:flex;align-items:center;justify-content:center;
      padding:1.5rem;
    }
    .wedding-card{
      max-width:900px;width:100%;
      background:rgba(255,255,255,.8);
      backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
      border-radius:48px 24px 48px 24px;
      box-shadow:0 25px 45px -10px rgba(210,130,150,.4),
                 0 0 0 2px #fff9fb inset,
                 0 0 0 4px rgba(255,220,240,.6);
      padding:2rem 2rem 2.5rem;
    }
    .image-section{text-align:center;margin-bottom:1.2rem;}
    .wedding-img{
      max-width:100%;
      height:auto;
      border-radius:30px;
      box-shadow:0 15px 25px -8px rgba(180,100,120,.5);
      border:4px solid #fff;
      object-fit:cover;
      max-height:260px;
      width:auto;
    }
    h1{
      text-align:center;
      font-size:2.4rem;
      letter-spacing:2px;
      color:#b3446c;
      text-shadow:3px 3px 0 #ffd9e6;
      margin:.8rem 0 .5rem;
      display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;
    }
    h1 span{font-size:2.8rem;line-height:1;}
    .message-box{
      background:#ffffffdd;
      border-radius:32px 16px 32px 16px;
      padding:2rem 2.2rem;
      margin:1.5rem 0 2rem;
      border:2px dashed #ffb3c6;
      box-shadow:0 8px 0 #bb7a8e;
      font-size:1.3rem;
      line-height:1.6;
      color:#2d1f2b;
      text-align:center;
      word-wrap:break-word;
    }
    .video-wrapper{
      margin:1.2rem 0 1.2rem;
      border-radius:30px;
      overflow:hidden;
      box-shadow:0 20px 30px -5px rgba(150,80,100,.4);
      border:4px solid #fff;
      background:#ffe7f0;
    }
    .video-container{position:relative;padding-bottom:56.25%;height:0;overflow:hidden;max-width:100%;}
    .video-container iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:0;}
    .song-caption{
      text-align:center;
      font-size:1rem;
      padding:.6rem .8rem .9rem;
      color:#a54e6b;
      font-style:italic;
      font-weight:500;
      letter-spacing:.5px;
      background:linear-gradient(180deg,rgba(255,255,255,.65),rgba(255,255,255,.15));
    }
    .button-panel{
      display:flex;flex-wrap:wrap;justify-content:center;
      gap:12px 10px;margin:1.6rem 0 .5rem;
    }
    .style-btn{
      background:#fff0f5;border:3px solid #fff;outline:none;
      padding:.9rem 1.5rem;border-radius:60px;
      font-size:1.1rem;font-weight:600;color:#7f3e4f;
      box-shadow:0 5px 0 #dba1b4,0 8px 14px rgba(170,100,120,.2);
      cursor:pointer;transition:.1s linear;
      display:inline-flex;align-items:center;gap:6px;line-height:1;
    }
    .style-btn:hover{transform:translateY(-3px);box-shadow:0 8px 0 #dba1b4,0 12px 20px rgba(170,100,120,.25);background:#ffe4ed;}
    .style-btn:active{transform:translateY(5px);box-shadow:0 2px 0 #b26b82;}
    .khmer-font-fix{font-family:"Leelawadee UI","Khmer OS","MoolBoran","Segoe UI",sans-serif;}
    footer{text-align:center;margin-top:2rem;color:#ad6d82;font-weight:400;font-size:1rem;opacity:.85;}
    @media (max-width:480px){
      .wedding-card{padding:1.2rem 1rem;}
      h1{font-size:2rem;}
      .message-box{font-size:1.1rem;padding:1.5rem;}
      .style-btn{padding:.7rem 1.2rem;font-size:1rem;}
      .wedding-img{max-height:350px;}
    }
  </style>
</head>

<body>
  <div class="wedding-card">
    <!-- 🌸 image section -->
    <div class="image-section">
      <!-- IMPORTANT: put pic.jpg in the SAME folder as index.html -->
      <img class="wedding-img" src="./image.png" alt="Wedding photo" loading="lazy" />
    </div>

    <!-- 🎵 embedded song (YouTube) -->
    <div class="video-wrapper">
      <div class="video-container">
        <iframe
          src="https://www.youtube.com/embed/UBj9OmRnKh4?autoplay=0&rel=0"
          title="All3rgy & Jenna Norodom - សូរិយា (Official Music Video)"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          referrerpolicy="strict-origin-when-cross-origin"
          allowfullscreen>
        </iframe>
      </div>
      <div class="song-caption">
        🎶 All3rgy & Jenna Norodom – សូរិយា (official video) · wedding song
      </div>
    </div>

    <h1><span>💍✨</span> Wedding Wishes <span>✨💍</span></h1>

    <!-- dynamic message area -->
    <div id="weddingMessage" class="message-box"></div>

    <!-- style buttons -->
    <div class="button-panel">
      <button class="style-btn" data-style="original">🌸 Original</button>
      <button class="style-btn" data-style="romantic">💌 Romantic</button>
      <button class="style-btn" data-style="short">😄 Short & simple</button>
      <button class="style-btn" data-style="formal">👑 Formal</button>
      <button class="style-btn" data-style="christian">🌸 Christian blessing</button>
      <button class="style-btn" data-style="khmer">🇰🇭 Khmer version</button>
    </div>

    <footer>⸻ click a style, change the blessing ⸻</footer>
  </div>

  <script>
    (function () {
      const messages = {
        original: `💍✨ Wedding Congratulations ✨💍<br><br>
Congratulations on your special day!<br>
May your marriage be filled with endless love, joy, and understanding.<br><br>
May you always support each other, laugh together, grow together,<br>
and build a beautiful life full of happiness and success.<br><br>
Wishing you a lifetime of sweet memories, strong partnership,<br>
and a love that grows deeper every single day.<br><br>
💖 Happy Wedding Day! 💖`,

        romantic: `💌 My love, today my heart is so full it might burst.<br>
Watching you say "I do" was the most beautiful moment of my life.<br>
You are my dream come true, my forever home.<br>
I promise to spend every day cherishing you,<br>
holding your hand through every storm,<br>
and dancing with you under every star.<br>
My love for you is a journey that starts today and never ends.<br><br>
✨ Forever yours, forever us. ✨`,

        short: `😄 Congrats you two! So happy for you!<br>
Wishing you a lifetime of love, laughter, and happily ever after.<br>
Cheers to the new Mr. & Mrs.! 🥂<br><br>
❤️ Enjoy every moment! ❤️`,

        formal: `👑 Please accept our heartfelt congratulations on your recent nuptials.<br>
We wish you a lifetime of shared happiness and mutual success.<br>
May the commitment you have made today be the foundation<br>
for a future filled with prosperity and enduring love.<br><br>
With warmest regards and every good wish for your future together.`,

        christian: `🌸 May you be blessed by the Lord on this joyous day.<br>
May your marriage be a reflection of Christ's love for the church –<br>
selfless, enduring, and pure.<br>
May He guide you, strengthen your bond, and fill your home<br>
with peace and grace.<br>
As you walk in faith together, may your love for each other<br>
grow deeper with every passing day.<br><br>
🙏 In Jesus' name, Amen. 🙏`,

        khmer: `🇰🇭 សូមអបអរសាទរក្នុងថ្ងៃមង្គលការរបស់លោកអ្នក!<br>
សូមឱ្យអាពាហ៍ពិពាហ៍របស់លោកអ្នកពោរពេញទៅដោយក្តីស្រឡាញ់<br>
សេចក្តីរីករាយ និងការយោគយល់គ្នា។<br><br>
សូមឱ្យលោកអ្នកតែងតែគាំទ្រគ្នា សើចសប្បាយជាមួយគ្នា<br>
រីកចម្រើនជាមួយគ្នា និងកសាងជីវិតដ៏ស្រស់ស្អាត<br>
ពោរពេញដោយសុភមង្គល និងជោគជ័យ។<br><br>
💖 សូមរីករាយថ្ងៃរៀបការ! 💖`
      };

      const messageDiv = document.getElementById("weddingMessage");

      function displayMessage(styleKey) {
        if (styleKey === "khmer") messageDiv.classList.add("khmer-font-fix");
        else messageDiv.classList.remove("khmer-font-fix");

        messageDiv.innerHTML = messages[styleKey] || messages.original;
      }

      displayMessage("original");

      document.querySelectorAll(".style-btn").forEach((btn) => {
        btn.addEventListener("click", function () {
          displayMessage(this.dataset.style);
        });
      });
    })();
  </script>
</body>
</html>
